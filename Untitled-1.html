<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Manipulação do DOM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .espaco {
            margin-bottom: 15px;
        }
        input, button {
            padding: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 1. Elementos estruturados no DOM -->
    <h1 id="tituloPrincipal">Título Original</h1>
    <p id="paragrafoExemplo">Este é o parágrafo inicial.</p>

    <div class="espaco">
        <input type="text" id="meuInput" placeholder="Digite algo aqui...">
    </div>
    
    <div class="espaco">
        <button id="meuBotao">Mudar Cor do Título</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
